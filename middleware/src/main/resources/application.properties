spring.application.name=middleware
spring.threads.virtual.enabled=true
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/middleware}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:middleware}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:middleware}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
speedtracking.service.base-url=${SPEEDTRACKING_SERVICE_BASE_URL:http://localhost:8000}
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:200MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:200MB}
minio.endpoint=${MINIO_ENDPOINT_URL:http://minio:9000}
minio.bucket=${MINIO_BUCKET:deliveries}
minio.access-key=${MINIO_ROOT_USER:minioadmin}
minio.secret-key=${MINIO_ROOT_PASSWORD:minioadmin}
minio.presign.ttl-minutes=${MINIO_PRESIGN_TTL_MINUTES:15}
delivery.stream.timeout-ms=${DELIVERY_STREAM_TIMEOUT_MS:120000}
