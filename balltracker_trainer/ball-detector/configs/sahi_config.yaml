# SAHI (Slicing Aided Hyper Inference) parameters
# Used by scripts/sahi_inference.py for evaluation and auto-labeling

slice_height: 320
slice_width: 320
overlap_height_ratio: 0.2
overlap_width_ratio: 0.2

# Post-processing
postprocess_type: NMS       # NMS or NMM (Non-Max Merging)
postprocess_match_metric: IOS  # IOU or IOS
postprocess_match_threshold: 0.5

# Confidence
confidence_threshold: 0.25

# Export
export_format: coco         # coco or yolo — for auto-labeling output
