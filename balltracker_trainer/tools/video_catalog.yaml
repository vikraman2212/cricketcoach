# Video Catalog — Curated sources for cricket bowling footage
#
# DATA PROVENANCE STRATEGY
# ========================
# Phase A (Prototyping): YouTube downloads — dataset stays PRIVATE, model weights PRIVATE.
# Phase B (Release):     Replace with own footage + permissive datasets — weights can be PUBLISHED.
#
# Each entry defines a video source with metadata for filtered downloading.
# Use `download_videos.py --ball-color red --angle behind_stumps` to filter.
#
# Fields:
#   url:            YouTube URL or local file path
#   camera_angle:   behind_stumps | umpire_pov | side_on
#   ball_color:     red | white | pink
#   bowling_style:  fast | medium | spin
#   laterality:     right | left
#   bowler_name:    Optional identifier
#   license:        youtube | cc_by | own_footage | unknown
#   notes:          Free-text description

videos:
  # ─────────────────────────────────────────────────────────────────────
  # BALL DETECTOR — CLUB / LOCAL CRICKET (primary training set)
  # Rationale: club-level footage matches real-world app usage — rough
  # outfield, sub-optimal lighting, recreational bowler variation.
  # ─────────────────────────────────────────────────────────────────────

  # Club fast bowling — red ball — behind stumps — nets/weekend match
  - url: "ytsearch6:club cricket fast bowling behind stumps red ball net practice"
    camera_angle: behind_stumps
    ball_color: red
    bowling_style: fast
    laterality: right
    license: youtube
    notes: "club/amateur fast bowling; varied action quality and pitch conditions"

  - url: "ytsearch5:local cricket bowling nets behind wicket red ball weekend match"
    camera_angle: behind_stumps
    ball_color: red
    bowling_style: fast
    laterality: right
    license: youtube
    notes: "weekend league and net session footage; natural background clutter"

  # Club medium pace — red ball — behind stumps
  - url: "ytsearch5:club cricket medium pace bowling behind stumps red ball seam"
    camera_angle: behind_stumps
    ball_color: red
    bowling_style: medium
    laterality: right
    license: youtube
    notes: "recreational seamer; shows full seam trajectory and variable bounce"

  - url: "ytsearch4:amateur cricket bowling nets medium pace red ball practice session"
    camera_angle: behind_stumps
    ball_color: red
    bowling_style: medium
    laterality: right
    license: youtube
    notes: "amateur nets; handheld/GoPro camera angles — important for augmentation diversity"

  # Club spin bowling — red ball — behind stumps
  - url: "ytsearch5:club cricket spin bowling behind stumps red ball turn flight"
    camera_angle: behind_stumps
    ball_color: red
    bowling_style: spin
    laterality: right
    license: youtube
    notes: "club off-spin/leg-spin; slower ball speed helps frame-level annotation"

  - url: "ytsearch4:local cricket nets spinner bowling behind wicket red ball flighted delivery"
    camera_angle: behind_stumps
    ball_color: red
    bowling_style: spin
    laterality: left
    license: youtube
    notes: "left-arm orthodox club spinner; important for laterality balance"

  # Club white-ball — behind stumps (T20 league, tape-ball)
  - url: "ytsearch5:club cricket T20 league bowling behind stumps white ball"
    camera_angle: behind_stumps
    ball_color: white
    bowling_style: fast
    laterality: right
    license: youtube
    notes: "club T20 / gully cricket; white ball under mixed daylight"

  - url: "ytsearch4:tape ball cricket bowling behind stumps white ball gully cricket nets"
    camera_angle: behind_stumps
    ball_color: white
    bowling_style: medium
    laterality: right
    license: youtube
    notes: "tape-ball nets common in South Asia; different ball reflectance from leather"

  - url: "ytsearch4:left handed bowler cricket bowling nets white ball behind stumps practise session"
    camera_angle: behind_stumps
    ball_color: white
    bowling_style: medium
    laterality: left
    license: youtube
    notes: "tape-ball nets common in South Asia; different ball reflectance from leather"

  # ─────────────────────────────────────────────────────────────────────
  # BOWLER POSE — CLUB / LOCAL CRICKET (joint keypoint training)
  # Goal: diverse amateur body types, run-up lengths, release points
  # ─────────────────────────────────────────────────────────────────────

  # Club fast bowler — side-on — full run-up and delivery stride
  - url: "ytsearch5:club cricket fast bowler side on full run up action technique amateur"
    camera_angle: side_on
    ball_color: red
    bowling_style: fast
    laterality: right
    license: youtube
    notes: "varied amateur fast action; captures diverse front-foot positions"

  - url: "ytsearch4:local cricket bowling action side on analysis junior fast bowler"
    camera_angle: side_on
    ball_color: red
    bowling_style: fast
    laterality: right
    license: youtube
    notes: "junior/youth club bowling; smaller body frames expand keypoint variety"

  # Club spinner — side-on — arm action, pivot, follow-through
  - url: "ytsearch4:club cricket spinner side on bowling action leg spin off spin amateur"
    camera_angle: side_on
    ball_color: red
    bowling_style: spin
    laterality: right
    license: youtube
    notes: "amateur wrist/finger spin — broader wrist angle distribution than professional"

  # Junior / youth nets — mixed — umpire/behind POV
  - url: "ytsearch4:youth cricket bowling nets junior club behind stumps mixed styles"
    camera_angle: behind_stumps
    ball_color: red
    bowling_style: medium
    laterality: right
    license: youtube
    notes: "junior nets; smaller ball:body ratio and variable run-up length"

  # ─────────────────────────────────────────────────────────────────────
  # INTERNATIONAL (supplementary — provides clean ground-truth labels)
  # Keep a small international set so the model learns ideal technique too
  # ─────────────────────────────────────────────────────────────────────

  - url: "ytsearch3:cricket fast bowling behind stumps red ball county nets slow motion"
    camera_angle: behind_stumps
    ball_color: red
    bowling_style: fast
    laterality: right
    license: youtube
    notes: "county-level nets; semi-pro quality; bridge between club and international"

  - url: "ytsearch3:cricket fast bowler side on slow motion full delivery stride technique"
    camera_angle: side_on
    ball_color: red
    bowling_style: fast
    laterality: right
    license: youtube
    notes: "professional side-on reference for pose ground-truth"

  - url: "ytsearch2:cricket bowling umpire view crease no-ball front foot club match"
    camera_angle: umpire_pov
    ball_color: red
    bowling_style: fast
    laterality: right
    license: youtube
    notes: "umpire POV from club/league matches; crease legality detection"

