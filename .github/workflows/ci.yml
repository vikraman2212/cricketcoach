name: CI

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

jobs:
    # ── Java: Spring Boot middleware ─────────────────────────────────────────────
    test-middleware:
        name: Middleware (Maven)
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: middleware
        steps:
            - uses: actions/checkout@v4

            - name: Set up Java 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: temurin

            - name: Cache Maven packages
              uses: actions/cache@v4
              with:
                  path: ~/.m2/repository
                  key: ${{ runner.os }}-maven-${{ hashFiles('middleware/pom.xml') }}
                  restore-keys: ${{ runner.os }}-maven-

            - name: Run tests
              run: ./mvnw --batch-mode test

    # ── Python: speed-tracking API ───────────────────────────────────────────────
    test-speedtracking-api:
        name: Speed-tracking API (pytest)
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: speedtracking-api
        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: pip
                  cache-dependency-path: speedtracking-api/requirements.txt

            - name: Install dependencies
              run: |
                  pip install -r requirements.txt
                  pip install pytest pytest-asyncio httpx

            - name: Run tests
              run: |
                  if [ -d tests ] && [ "$(find tests -name 'test_*.py' | wc -l)" -gt 0 ]; then
                    pytest tests/ -v
                  else
                    echo "No tests found — skipping (add tests under speedtracking-api/tests/)"
                  fi

    # ── Shell: Docker Compose smoke tests ───────────────────────────────────────
    test-compose:
        name: Docker Compose smoke tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Validate docker-compose.yml
              run: |
                  if [ -f docker-compose.yml ]; then
                    bash tests/test_compose.sh
                  else
                    echo "No docker-compose.yml found — skipping compose tests."
                  fi
